<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ролевая игра</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header>
            <h1 id="player-name">Игрок</h1>
            <div class="level-bar">
                <span>Уровень <strong id="player-level">1</strong></span>
                <div class="exp-container">
                    <div class="exp-bar" id="exp-bar"></div>
                </div>
            </div>
            <p>Золото: <strong id="gold">0</strong></p>
        </header>

        <!-- Характеристики -->
        <section class="stats">
            <h2>Характеристики</h2>
            <div class="stat-row">
                <label>СИЛ</label>
                <span id="str">1</span>
                <button onclick="upgradeStat('STR')">+</button>
            </div>
            <div class="stat-row">
                <label>ЛОВ</label>
                <span id="agi">1</span>
                <button onclick="upgradeStat('AGI')">+</button>
            </div>
            <div class="stat-row">
                <label>ИНТ</label>
                <span id="int">1</span>
                <button onclick="upgradeStat('INT')">+</button>
            </div>
            <div class="stat-row">
                <label>ВЫН</label>
                <span id="vit">1</span>
                <button onclick="upgradeStat('VIT')">+</button>
            </div>
            <div class="stat-row">
                <label>ЛОВК</label>
                <span id="dex">1</span>
                <button onclick="upgradeStat('DEX')">+</button>
            </div>
            <div class="stat-row">
                <label>УДАЧА</label>
                <span id="luk">1</span>
                <button onclick="upgradeStat('LUK')">+</button>
            </div>
        </section>

        <!-- Инвентарь -->
        <section class="inventory">
            <h2>Инвентарь</h2>
            <button onclick="buyItem('health_potion')">Купить зелье здоровья (+50 HP) — 100💰</button>
            <button onclick="buyItem('mana_potion')">Купить зелье маны — 80💰</button>
            <div id="inventory-items"></div>
        </section>

        <!-- Бой -->
        <section class="battle">
            <h2>Бой</h2>
            <button onclick="startBattle()">Сражаться!</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
